{% extends "base.html" %}

{% block title %}Edit Review - {{ book.title }}{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row">
        <div class="col-md-8 mx-auto">

            <div class="mb-4">
                <span class="text-uppercase text-muted tracking-wider small">Modify Contribution</span>
                <h2 class="fw-bold text-dark mt-1 mb-2">Edit Review</h2>
                <p class="text-muted">Updating your thoughts on <strong class="text-dark">{{ book.title }}</strong></p>
                <hr class="my-3">
            </div>

            <div class="card shadow-sm border-0 rounded p-4 bg-white border-top border-dark border-4">
                <form method="post">
                    {% csrf_token %}

                    <div class="mb-4 custom-form-fields">
                        {{ review_form.as_p }}
                    </div>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-dark rounded-pill px-4 py-2 fw-semibold shadow-sm">
                            <i class="bi bi-check2-circle me-1"></i> Save Changes
                        </button>
                        <a href="{% url 'books:detail' book.id %}" class="btn btn-outline-secondary rounded-pill px-4 py-2">
                            Cancel
                        </a>
                    </div>
                </form>
            </div>

        </div>
    </div>
</div>

<style>
    /* Styling injected standard paragraphs from as_p cleaner mapping */
    .custom-form-fields p {
        margin-bottom: 1.25rem;
    }
    .custom-form-fields label {
        font-weight: 600;
        color: #495057;
        font-size: 0.875rem;
        display: block;
        margin-bottom: 0.5rem;
    }
    .custom-form-fields input,
    .custom-form-fields select,
    .custom-form-fields textarea {
        display: block;
        width: 100%;
        padding: 0.375rem 0.75rem;
        font-size: 1rem;
        font-weight: 400;
        line-height: 1.5;
        color: #212529;
        background-color: #fff;
        background-clip: padding-box;
        border: 1px solid #dee2e6;
        -webkit-appearance: none;
        -moz-appearance: none;
        appearance: none;
        border-radius: 0.375rem;
        transition: border-color .15s ease-in-out,box-shadow .15s ease-in-out;
    }
    .custom-form-fields input:focus,
    .custom-form-fields select:focus,
    .custom-form-fields textarea:focus {
        border-color: #212529;
        outline: 0;
        box-shadow: 0 0 0 0.25rem rgba(33, 37, 41, 0.05);
    }
</style>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
{% endblock %}
